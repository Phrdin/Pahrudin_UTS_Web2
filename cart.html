<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - Nurdinshop</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">

    <!-- Navbar (Sama dengan Index) -->
    <nav class="bg-navy-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-white hover:opacity-80 transition-opacity">Nurdinshop</a>
                </div>
                <!-- Cart & Auth -->
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-slate-300 hover:text-cyan-400 text-sm font-medium mr-4 transition-colors">← Lanjut Belanja</a>
                    <a href="login.html" id="authBtn" class="bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white px-5 py-2 rounded-full text-sm font-medium transition-all shadow-md">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Cart Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <h1 class="text-3xl font-bold text-navy-900 mb-8 border-b-4 border-cyan-500 pb-2 inline-block">Keranjang Belanja</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Cart Items Section -->
            <div class="w-full lg:w-2/3">
                <div id="cartItemsContainer" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                    <!-- Data cart akan dirender via JS -->
                </div>
            </div>

            <!-- Order Summary Section -->
            <div class="w-full lg:w-1/3">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-navy-900 mb-6">Ringkasan Pesanan</h2>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-slate-600">
                            <span>Subtotal</span>
                            <span id="summarySubtotal" class="font-medium text-navy-900">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-slate-600">
                            <span>Pajak PPN (11%)</span>
                            <span id="summaryTax" class="font-medium text-navy-900">Rp 0</span>
                        </div>
                    </div>
                    
                    <div class="border-t border-slate-200 pt-4 mb-8">
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold text-navy-900">Total Keseluruhan</span>
                            <span id="summaryTotal" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-navy-900 to-cyan-600">Rp 0</span>
                        </div>
                    </div>
                    
                    <button id="checkoutBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-[0_4px_14px_0_rgba(6,182,212,0.39)] hover:shadow-[0_6px_20px_rgba(6,182,212,0.23)] flex justify-center items-center">
                        Lanjut ke Pembayaran
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-navy-900 text-slate-300 py-6 border-t border-navy-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            &copy; 2026 Nurdinshop.
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3"></div>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
