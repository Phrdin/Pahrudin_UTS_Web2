<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Nurdinshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-navy-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-white hover:opacity-80 transition-opacity">Nurdinshop</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="text-slate-300 hover:text-cyan-400 text-sm font-medium transition-colors">← Kembali ke Keranjang</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <h1 class="text-3xl font-bold text-navy-900 mb-8 border-b-4 border-cyan-500 pb-2 inline-block">Checkout Pesanan</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Form Pengiriman -->
            <div class="w-full lg:w-2/3">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
                    <h2 class="text-xl font-bold text-navy-900 mb-6">Informasi Pengiriman</h2>
                    
                    <form id="checkoutForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-navy-900 mb-2">Nama Penerima</label>
                                <input type="text" id="shipName" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" placeholder="Nama Lengkap">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-navy-900 mb-2">Nomor HP</label>
                                <input type="tel" id="shipPhone" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" placeholder="081234567890">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-navy-900 mb-2">Alamat Lengkap</label>
                            <textarea id="shipAddress" required rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all" placeholder="Nama Jalan, Gedung, No. Rumah..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-navy-900 mb-2">Metode Pembayaran</label>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <label class="border border-cyan-500 bg-cyan-50 p-4 rounded-xl flex items-center cursor-pointer">
                                    <input type="radio" name="payment" value="transfer" checked class="w-4 h-4 text-cyan-600 focus:ring-cyan-500 border-gray-300">
                                    <span class="ml-3 font-semibold text-navy-900">Transfer Bank</span>
                                </label>
                                <label class="border border-slate-200 hover:border-cyan-500 p-4 rounded-xl flex items-center cursor-pointer transition-colors">
                                    <input type="radio" name="payment" value="cod" class="w-4 h-4 text-cyan-600 focus:ring-cyan-500 border-gray-300">
                                    <span class="ml-3 font-semibold text-navy-900">Bayar di Tempat (COD)</span>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-navy-900 to-blue-800 hover:from-blue-800 hover:to-cyan-600 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-md transform hover:-translate-y-0.5 mt-4">
                            Konfirmasi & Buat Pesanan
                        </button>
                    </form>
                </div>
            </div>

            <!-- Ringkasan Checkout -->
            <div class="w-full lg:w-1/3">
                <div class="bg-slate-100 rounded-2xl p-6 sticky top-24 border border-slate-200">
                    <h2 class="text-lg font-bold text-navy-900 mb-4">Total Pembayaran</h2>
                    <div id="checkoutItems" class="space-y-3 mb-6 border-b border-slate-300 pb-4">
                        <!-- Items rendered by JS -->
                    </div>
                    <div class="flex justify-between items-center text-xl font-bold text-navy-900">
                        <span>Total:</span>
                        <span id="checkoutTotal">Rp 0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Sukses (Hidden by default) -->
    <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-navy-900/80 backdrop-blur-sm px-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="modalContent">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold text-navy-900 mb-2">Pesanan Berhasil!</h3>
            <p class="text-slate-500 mb-8">Terima kasih telah berbelanja di Nurdinshop. Pesanan Anda akan segera diproses.</p>
            <a href="index.html" class="block w-full bg-navy-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition-colors">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            // Pre-fill name
            document.getElementById('shipName').value = currentUser.name;

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            // Render summary
            const formatRupiah = (number) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0}).format(number);
            const checkoutItems = document.getElementById('checkoutItems');
            
            let subtotal = 0;
            checkoutItems.innerHTML = cart.map(item => {
                subtotal += (item.price * item.quantity);
                return `
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-600 truncate pr-4">${item.quantity}x ${item.name}</span>
                        <span class="font-medium text-navy-900 whitespace-nowrap">${formatRupiah(item.price * item.quantity)}</span>
                    </div>
                `;
            }).join('');
            
            const tax = subtotal * 0.11;
            document.getElementById('checkoutTotal').textContent = formatRupiah(subtotal + tax);

            // Handle Submit
            document.getElementById('checkoutForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Simpan ke Orders History
                const orders = JSON.parse(localStorage.getItem('orders')) || [];
                orders.push({
                    id: 'ORD' + Date.now(),
                    date: new Date().toISOString(),
                    items: cart,
                    total: subtotal + tax,
                    customer: {
                        name: document.getElementById('shipName').value,
                        phone: document.getElementById('shipPhone').value,
                        address: document.getElementById('shipAddress').value
                    }
                });
                localStorage.setItem('orders', JSON.stringify(orders));
                
                // Kosongkan cart
                localStorage.removeItem('cart');

                // Tampilkan Modal
                const modal = document.getElementById('successModal');
                const modalContent = document.getElementById('modalContent');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                // Trigger animation
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            });
        });
    </script>
</body>
</html>
