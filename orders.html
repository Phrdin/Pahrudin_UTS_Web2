<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Nurdinshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-navy-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-white hover:opacity-80 transition-opacity">Nurdinshop</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-slate-300 hover:text-cyan-400 text-sm font-medium transition-colors">← Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <h1 class="text-3xl font-bold text-navy-900 mb-8 border-b-4 border-cyan-500 pb-2 inline-block">Riwayat Pesanan (Order History)</h1>
        <div id="ordersContainer" class="space-y-6 max-w-4xl">
            <!-- Data riwayat pesanan akan dirender di sini via JS -->
        </div>
    </main>

    <footer class="bg-navy-900 text-slate-300 py-6 border-t border-navy-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            &copy; 2026 Nurdinshop.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            // Filter pesanan khusus untuk user yang sedang login
            const userOrders = orders.filter(o => o.customer.name === currentUser.name);

            const container = document.getElementById('ordersContainer');
            const formatRupiah = (number) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0}).format(number);

            if (userOrders.length === 0) {
                container.innerHTML = `
                <div class="bg-white p-10 rounded-2xl text-center shadow-sm border border-slate-100">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 mb-6">
                        <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-navy-900 mb-2">Belum Ada Transaksi</h3>
                    <p class="text-slate-500 mb-6">Anda belum memiliki riwayat pembelian. Ayo belanja sekarang!</p>
                    <a href="index.html" class="inline-block bg-navy-900 text-white px-6 py-2.5 rounded-full font-medium shadow-md hover:bg-blue-800 transition-colors">Belanja Sekarang</a>
                </div>`;
                return;
            }

            container.innerHTML = userOrders.sort((a,b) => new Date(b.date) - new Date(a.date)).map(order => {
                const date = new Date(order.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const itemsHtml = order.items.map(item => `
                    <div class="flex justify-between items-center text-sm py-3 border-b border-slate-100 last:border-0">
                        <div class="flex items-center">
                            <span class="bg-slate-100 text-slate-600 font-bold px-2 py-1 rounded mr-3">${item.quantity}x</span>
                            <span class="font-medium text-slate-700">${item.name}</span>
                        </div>
                        <span class="font-bold text-navy-900">${formatRupiah(item.price * item.quantity)}</span>
                    </div>
                `).join('');

                return `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="bg-slate-50 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center border-b border-slate-200">
                        <div class="mb-2 sm:mb-0">
                            <p class="text-xs font-bold text-cyan-600 tracking-wider mb-1">ID TRANSAKSI: ${order.id}</p>
                            <p class="text-sm text-slate-500 font-medium">${date}</p>
                        </div>
                        <span class="bg-green-100 border border-green-200 text-green-700 text-xs font-extrabold px-4 py-1.5 rounded-full inline-block text-center shadow-sm">BERHASIL</span>
                    </div>
                    
                    <div class="p-6">
                        <div class="mb-4">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Detail Produk</p>
                            ${itemsHtml}
                        </div>
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-6 pt-4 border-t border-slate-100">
                            <div class="mb-4 sm:mb-0">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Dikirim ke:</p>
                                <p class="text-sm font-bold text-navy-900">${order.customer.name} <span class="font-normal text-slate-500">(${order.customer.phone})</span></p>
                                <p class="text-xs text-slate-500 mt-0.5 max-w-xs">${order.customer.address}</p>
                            </div>
                            <div class="text-left sm:text-right w-full sm:w-auto bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <p class="text-xs font-bold text-slate-500 uppercase mb-1">Total Pembayaran</p>
                                <p class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-navy-900 to-cyan-600">${formatRupiah(order.total)}</p>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
