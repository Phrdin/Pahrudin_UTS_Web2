<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Nurdinshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-30"></div>

    <div class="max-w-md w-full mx-4 relative z-10">
        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-xl border border-white/50">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-navy-900 mb-2 tracking-tight">Buat Akun</h1>
                <p class="text-slate-500 text-sm">Gabung dan temukan outfit impianmu.</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label for="regName" class="block text-sm font-semibold text-navy-900 mb-1">Nama Lengkap</label>
                    <input type="text" id="regName" required class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all" placeholder="Pahrudin">
                </div>
                <div>
                    <label for="regEmail" class="block text-sm font-semibold text-navy-900 mb-1">Email</label>
                    <input type="email" id="regEmail" required class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all" placeholder="contoh@mahasiswa.com">
                </div>
                <div>
                    <label for="regPassword" class="block text-sm font-semibold text-navy-900 mb-1">Password</label>
                    <input type="password" id="regPassword" required minlength="6" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all" placeholder="Minimal 6 karakter">
                </div>
                
                <div id="regError" class="text-red-500 text-xs font-medium hidden text-center">Email sudah terdaftar!</div>

                <button type="submit" class="w-full bg-gradient-to-r from-navy-900 to-blue-800 hover:from-blue-800 hover:to-cyan-600 text-white rounded-xl py-3.5 font-bold text-sm shadow-md transition-all duration-300 transform hover:-translate-y-0.5 mt-2">Daftar Sekarang</button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500">
                Sudah punya akun? <a href="login.html" class="text-cyan-600 font-bold hover:text-navy-900 transition-colors">Masuk di sini</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
