<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Nurdinshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">
    <nav class="bg-navy-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-white hover:opacity-80">Nurdinshop</a>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Global UI injects here -->
                    <a href="cart.html" class="relative group">
                        <svg class="w-6 h-6 text-slate-200 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span id="cartBadge" class="absolute -top-2 -right-2 bg-cyan-500 text-navy-900 text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center opacity-0 transition-opacity">0</span>
                    </a>
                    <a href="login.html" id="authBtn" class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-5 py-2 rounded-full text-sm font-medium transition-all shadow-md">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <h1 class="text-3xl font-bold text-navy-900 dark:text-white mb-8 border-b-4 border-cyan-500 pb-2 inline-block">Wishlist Saya</h1>
        <div id="wishlistContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Render via JS -->
        </div>
    </main>

    <footer class="bg-navy-900 text-slate-300 py-6 border-t border-navy-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">&copy; 2026 Nurdinshop.</div>
    </footer>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3"></div>

    <script src="data/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWishlist();
            
            // Re-render cart badge (simple version for this page)
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartBadge');
            const totalItems = cart.reduce((total, item) => total + item.quantity, 0);
            if (totalItems > 0 && badge) {
                badge.textContent = totalItems;
                badge.classList.remove('opacity-0');
            }
        });

        function renderWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const container = document.getElementById('wishlistContainer');
            
            if (wishlist.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 dark:text-slate-300">Belum ada outfit favorit.</div>`;
                return;
            }

            const formatRupiah = (number) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0}).format(number);
            
            const items = wishlist.map(id => productsData.find(p => p.id === id)).filter(Boolean);

            container.innerHTML = items.map(product => `
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden relative">
                    <img src="${product.image}" class="w-full h-56 object-cover" onerror="this.src='https://placehold.co/400x500/e2e8f0/64748b?text=Image'">
                    <button onclick="removeWishlist('${product.id}')" class="absolute top-3 right-3 bg-white/90 p-2 rounded-full text-red-500 shadow hover:bg-red-500 hover:text-white transition-colors">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
                    </button>
                    <div class="p-4">
                        <h3 class="font-bold text-navy-900 dark:text-white truncate">${product.name}</h3>
                        <p class="text-cyan-600 font-extrabold mt-1">${formatRupiah(product.price)}</p>
                    </div>
                </div>
            `).join('');
        }

        window.removeWishlist = (id) => {
            let wl = JSON.parse(localStorage.getItem('wishlist')) || [];
            wl = wl.filter(item => item !== id);
            localStorage.setItem('wishlist', JSON.stringify(wl));
            renderWishlist();
            if(typeof updateWishlistBadge === 'function') updateWishlistBadge();
        };
    </script>
</body>
</html>
